---
#
# This workflow builds a Docker image and passes it to Trivy for
# vulnerability scanning, only publishing it to ghrc.io if
# the scan passes.
#
name: Build and publish a Docker image

on:
  workflow_call:
    inputs:
      REF_TO_CHECKOUT:
        required: false
        type: string
        description: reference to checkout, e.g. a tag like v1.0.1.  Defaults to the branch/tag of the current event.
      IMAGE_REFERENCES:
        required: true
        type: string
        description: "image references, e.g., ghcr.io/sage-bionetworks/rstudio-service-catalog:1.0.1"

env:
  TARFILE_NAME: image.tar
  IMAGE_NAME: test-image

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: amd64
            runner: ubuntu-latest
          - platform: arm64
            runner: ubuntu-latest-arm

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.REF_TO_CHECKOUT }}

      - name: Set up Docker for multiplatform builds
        uses: docker/setup-docker-action@v4
        with:
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build platform-specific Docker image
        run: |
          docker build \
            --platform linux/${{ matrix.platform }} \
            -t ${{ env.IMAGE_NAME }}:${{ matrix.platform }} \
            .

          docker save \
            ${{ env.IMAGE_NAME }}:${{ matrix.platform }} \
            ${{ env.IMAGE_NAME }}:${{ matrix.platform }}.tar

      - name: Upload image output for this platform
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.platform }}
          path: ${{ env.IMAGE_NAME }}:${{ matrix.platform }}.tar
          retention-days: 1

  multi-platform:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Set up Docker for multiplatform builds
        uses: docker/setup-docker-action@v4
        with:
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download images
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          pattern: image-*

      - name: Build multi-platform image
        run: |
          docker load -i ${{ env.IMAGE_NAME }}.amd64.tar
          docker load -i ${{ env.IMAGE_NAME }}.arm64.tar

          docker buildx imagetools create \
            -t ${{ env.IMAGE_NAME }}:test \
            ${{ env.IMAGE_NAME }}:amd64 \
            ${{ env.IMAGE_NAME }}:arm64

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --output type=oci,dest=${{ env.TARFILE_NAME }} \
            --tag ${{ env.IMAGE_NAME }}:test \
            .

      - name: Upload tarball for use by Trivy job
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TARFILE_NAME }}
          path: ${{ env.TARFILE_NAME }}

    outputs:
      tarfile_artifact: ${{ env.TARFILE_NAME }}

  trivy-scan:
    needs: multi-platform
    uses: "./.github/workflows/trivy.yml"
    with:
      SOURCE_TYPE: tar
      IMAGE_NAME: ${{ env.IMAGE_NAME }}
      TARFILE_NAME: ${{ env.TARFILE_NAME }}
      EXIT_CODE: 1

  push-image:
    if: ${{ github.event_name == 'push' || github.event_name == 'schedule' }}
    needs: [multi-platform, trivy-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download multi-platform image
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.TARFILE_NAME }}

      - name: Load, tag, and push multi-platform image
        run: |
          docker load -i ${{ env.TARFILE_NAME }}
          
          for tag in "${{ inputs.IMAGE_REFERENCES }}"
          do
            docker tag ${{ env.IMAGE_NAME }}:test "${tag}"
            docker push "${tag}"
          done
...
