---
#
# This workflow builds a Docker image and passes it to Trivy for
# vulnerability scanning, only publishing it to ghrc.io if
# the scan passes.
#
name: Build and publish a Docker image

on:
  workflow_call:
    inputs:
      REF_TO_CHECKOUT:
        required: false
        type: string
        description: reference to checkout, e.g. a tag like v1.0.1.  Defaults to the branch/tag of the current event.
      IMAGE_REFERENCES:
        required: true
        type: string
        description: "image references, e.g., ghcr.io/sage-bionetworks/rstudio-service-catalog:1.0.1"

env:
  TARFILE_NAME: image.tar

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            runner: ubuntu-24.04
          - platform: linux-arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.REF_TO_CHECKOUT }}

      - name: Set up Docker
        uses: docker/setup-docker-action@v4
        with:
          daemon-config: |
            {
              "debug": true,
              "features": {
                "containerd-snapshotter": true
              }
            }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check that build works, save for scanning, but don't push yet
        uses: docker/build-push-action@v6.4.0
        with:
          context: .
          push: false
          cache-to: type=local,dest=./output/cache/${{ matrix.platform }}
          outputs: type=local,dest=./output/image/${{ matrix.platform }}

      - name: Upload image cache for this platform
        uses: actions/upload-artifact@v4
        with:
          name: cache-${{ matrix.platform }}
          path: ./output/cache/${{ matrix.platform }}

      - name: Upload image output for this platform
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.platform }}
          path: ./output/image

  tarfile:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Download all images
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: ./images
          pattern: image-*

      - name: Create tarball
        working-directory: ./images
        run: |
          ls -lah
          ls -lah *
          # tar .

      - name: Upload tarball for use by Trivy job
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TARFILE_NAME }}
          path: ${{ env.TARFILE_NAME }}

    outputs:
      tarfile_artifact: ${{ env.TARFILE_NAME }}

  trivy-scan:
    needs: tarfile
    uses: "./.github/workflows/trivy.yml"
    with:
      SOURCE_TYPE: tar
      IMAGE_NAME: image-name
      TARFILE_NAME: ${{ needs.tarfile.outputs.tarfile_artifact }}
      EXIT_CODE: 1

  push-image:
    if: ${{ github.event_name == 'push' || github.event_name == 'schedule' }}
    needs: [tests, trivy-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.REF_TO_CHECKOUT }}

      - name: Download image cache
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: ./cache
          pattern: cache-*

      - name: Build and push Docker image
        uses: docker/build-push-action@v6.4.0
        with:
          cache-from: type=local,src=./cache
          context: .
          push: true
          tags: ${{ inputs.IMAGE_REFERENCES }}
          platforms: linux/amd64,linux/arm64
...
